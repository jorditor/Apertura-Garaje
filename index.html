<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garaje</title>
  <script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container { text-align: center; padding: 40px 30px; width: 100%; max-width: 360px; }
    h1 { font-size: 22px; color: #aaa; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
    .subtitulo { font-size: 13px; color: #555; margin-bottom: 20px; }
    .estado-mqtt {
      font-size: 13px; padding: 6px 16px; border-radius: 20px;
      display: inline-block; margin-bottom: 40px; transition: all 0.3s;
    }
    .conectado    { background: #1a4a1a; color: #4ecca3; border: 1px solid #4ecca3; }
    .desconectado { background: #4a1a1a; color: #e94560; border: 1px solid #e94560; }
    .conectando   { background: #3a3a1a; color: #f0c040; border: 1px solid #f0c040; }
    .btn-abrir {
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #e94560);
      color: white; border: none; border-radius: 50%;
      width: 160px; height: 160px; font-size: 20px; font-weight: bold;
      cursor: pointer; letter-spacing: 2px;
      box-shadow: 0 0 30px rgba(233,69,96,0.4), 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.15s; display: block; margin: 0 auto 30px;
    }
    .btn-abrir:active:not(:disabled) { transform: scale(0.93); }
    .btn-abrir:disabled { background: radial-gradient(circle at 35% 35%, #555, #444); box-shadow: none; cursor: not-allowed; }
    .btn-abrir.abierto { background: radial-gradient(circle at 35% 35%, #4ecca3, #2eaa83); box-shadow: 0 0 30px rgba(78,204,163,0.5); }
    .btn-abrir.error   { background: radial-gradient(circle at 35% 35%, #e94560, #c0392b); }
    .status { font-size: 15px; min-height: 22px; color: #aaa; transition: color 0.3s; }
    .status.ok   { color: #4ecca3; }
    .status.err  { color: #e94560; }
    .token-badge {
      background: #0f3460; border: 1px solid #2e6da4;
      border-radius: 8px; padding: 8px 16px;
      font-size: 12px; color: #aaa; margin-bottom: 20px;
      display: inline-block;
    }
    .token-badge span { color: #4ecca3; font-weight: bold; letter-spacing: 2px; }
  </style>
</head>
<body>
<div class="container">
  <h1>Garaje</h1>
  <div class="subtitulo" id="subtitulo"></div>
  <div class="estado-mqtt desconectado" id="estadoMqtt">● Desconectado</div>
  <div id="tokenBadge"></div>
  <button class="btn-abrir" id="btnAbrir" onclick="abrir()" disabled>ABRIR</button>
  <div class="status" id="status"></div>
</div>

<script>
  var BROKER   = "wss://d3c63be4f2464ff7a1d80943eae17c28.s1.eu.hivemq.cloud:8884/mqtt";
  var USER     = "Jordi";
  var PASS     = "1923Jtlcom.";
  var TOPIC_ABRIR   = "garaje/abrir";
  var TOPIC_INVITADO = "garaje/invitado";
  var TOPIC_ESTADO  = "garaje/estado";
  var TOPIC_CONFIRM = "garaje/confirmacion";
  var TOPIC_TOKEN_OK = "garaje/token_ok";

  var client = null;
  var modoInvitado = false;
  var tokenInvitado = "";

  // Leer token de la URL (?t=XXXXXX)
  function getToken() {
    var params = new URLSearchParams(window.location.search);
    return params.get("t") ? params.get("t").toUpperCase() : "";
  }

  function setEstado(s) {
    var el = document.getElementById("estadoMqtt");
    if (s === "conectado") {
      el.textContent = "● Conectado";
      el.className = "estado-mqtt conectado";
      document.getElementById("btnAbrir").disabled = false;
    } else if (s === "conectando") {
      el.textContent = "● Conectando...";
      el.className = "estado-mqtt conectando";
      document.getElementById("btnAbrir").disabled = true;
    } else {
      el.textContent = "● Desconectado";
      el.className = "estado-mqtt desconectado";
      document.getElementById("btnAbrir").disabled = true;
    }
  }

  function conectar() {
    setEstado("conectando");
    var clientId = "web_garaje_" + Math.random().toString(16).substr(2, 8);

    client = mqtt.connect(BROKER, {
      clientId: clientId,
      username: USER,
      password: PASS,
      reconnectPeriod: 5000,
      keepalive: 30
    });

    client.on("connect", function() {
      setEstado("conectado");
      client.subscribe(TOPIC_CONFIRM);
      client.subscribe(TOPIC_TOKEN_OK);
    });

    client.on("error", function() { setEstado("desconectado"); });
    client.on("offline", function() { setEstado("desconectado"); });

    client.on("message", function(topic, payload) {
      var msg = payload.toString();
      var btn = document.getElementById("btnAbrir");
      var st  = document.getElementById("status");

      // Confirmacion hardware
      if (topic === TOPIC_CONFIRM && msg === "1") {
        st.textContent = "✓ Puerta abierta confirmada";
        st.className = "status ok";
        setTimeout(function() { st.textContent = ""; st.className = "status"; }, 5000);
      }

      // Respuesta validacion token invitado
      if (topic === TOPIC_TOKEN_OK) {
        btn.disabled = false;
        if (msg === "1") {
          btn.classList.remove("error");
          btn.classList.add("abierto");
          btn.textContent = "✓";
          st.textContent = "✓ Acceso concedido";
          st.className = "status ok";
          setTimeout(function() {
            btn.classList.remove("abierto");
            btn.textContent = "ABRIR";
            st.textContent = "";
            st.className = "status";
          }, 3000);
        } else {
          btn.classList.add("error");
          btn.textContent = "✗";
          st.textContent = "Token inválido o caducado";
          st.className = "status err";
          setTimeout(function() {
            btn.classList.remove("error");
            btn.textContent = "ABRIR";
            st.textContent = "";
            st.className = "status";
          }, 4000);
        }
      }
    });
  }

  function abrir() {
    if (!client || !client.connected) return;
    var btn = document.getElementById("btnAbrir");
    var st  = document.getElementById("status");

    btn.disabled = true;
    btn.textContent = "...";
    st.textContent = modoInvitado ? "Validando acceso..." : "Enviando orden...";
    st.className = "status ok";

    if (modoInvitado) {
      // Modo invitado: enviar token para validar
      client.publish(TOPIC_INVITADO, tokenInvitado);
    } else {
      // Modo admin: apertura directa
      client.publish(TOPIC_ABRIR, "1");
      btn.classList.add("abierto");
      btn.textContent = "✓";
      setTimeout(function() {
        btn.disabled = false;
        btn.classList.remove("abierto");
        btn.textContent = "ABRIR";
        st.textContent = "";
        st.className = "status";
      }, 3000);
    }
  }

  window.onload = function() {
    tokenInvitado = getToken();
    if (tokenInvitado) {
      modoInvitado = true;
      document.getElementById("subtitulo").textContent = "Acceso de invitado";
      document.getElementById("tokenBadge").innerHTML =
        "<div class='token-badge'>Token: <span>" + tokenInvitado + "</span></div>";
    }
    conectar();
  };
</script>
</body>
</html>
