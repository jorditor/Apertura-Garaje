<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garaje</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      padding: 40px 30px;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 22px;
      color: #aaa;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .estado-mqtt {
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 40px;
      transition: all 0.3s;
    }
    .conectado    { background: #1a4a1a; color: #4ecca3; border: 1px solid #4ecca3; }
    .desconectado { background: #4a1a1a; color: #e94560; border: 1px solid #e94560; }
    .conectando   { background: #3a3a1a; color: #f0c040; border: 1px solid #f0c040; }

    .btn-abrir {
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #e94560);
      color: white;
      border: none;
      border-radius: 50%;
      width: 160px;
      height: 160px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 0 30px rgba(233,69,96,0.4), 0 6px 20px rgba(0,0,0,0.4);
      transition: all 0.15s;
      display: block;
      margin: 0 auto 30px;
    }

    .btn-abrir:active:not(:disabled) {
      transform: scale(0.93);
      box-shadow: 0 0 15px rgba(233,69,96,0.6);
    }

    .btn-abrir:disabled {
      background: radial-gradient(circle at 35% 35%, #555, #444);
      box-shadow: none;
      cursor: not-allowed;
    }

    .btn-abrir.abierto {
      background: radial-gradient(circle at 35% 35%, #4ecca3, #2eaa83);
      box-shadow: 0 0 30px rgba(78,204,163,0.5);
    }

    .status {
      font-size: 15px;
      min-height: 22px;
      color: #aaa;
      transition: color 0.3s;
    }
    .status.ok   { color: #4ecca3; }
    .status.err  { color: #e94560; }
  </style>
</head>
<body>
<div class="container">
  <h1>Garaje</h1>
  <div class="estado-mqtt desconectado" id="estadoMqtt">Desconectado</div>
  <button class="btn-abrir" id="btnAbrir" onclick="abrir()" disabled>ABRIR</button>
  <div class="status" id="status"></div>
</div>

<script>
  // ── Configuración MQTT ────────────────────────────────────────────────────
  var BROKER   = "d3c63be4f2464ff7a1d80943eae17c28.s1.eu.hivemq.cloud";
  var PORT     = 8884;
  var USER     = "Jordi";
  var PASS     = "1923Jtlcom.";
  var TOPIC    = "garaje/abrir";
  var TOPIC_ST = "garaje/estado";

  var client;
  var conectado = false;

  function conectar() {
    var clientId = "web_garaje_" + Math.random().toString(16).substr(2, 8);
    client = new Paho.MQTT.Client(BROKER, PORT, "/mqtt", clientId);

    client.onConnectionLost = function(r) {
      conectado = false;
      setEstado("desconectado");
      document.getElementById("btnAbrir").disabled = true;
      setTimeout(conectar, 5000);  // reintentar cada 5s
    };

    client.onMessageArrived = function(msg) {
      if (msg.destinationName === TOPIC_ST) {
        console.log("Estado garaje:", msg.payloadString);
      }
      if (msg.destinationName === TOPIC_CONFIRM && msg.payloadString === "1") {
        var st = document.getElementById("status");
        st.textContent = "✓ Puerta abierta confirmada";
        st.className = "status ok";
        setTimeout(function() {
          st.textContent = "";
          st.className = "status";
        }, 5000);
      }
    };

    setEstado("conectando");

    client.connect({
      useSSL: true,
      userName: USER,
      password: PASS,
      keepAliveInterval: 30,
      onSuccess: function() {
        conectado = true;
        setEstado("conectado");
        document.getElementById("btnAbrir").disabled = false;
        client.subscribe(TOPIC_ST);
        client.subscribe(TOPIC_CONFIRM);
      },
      onFailure: function(e) {
        conectado = false;
        setEstado("desconectado");
        setTimeout(conectar, 5000);
      }
    });
  }

  function abrir() {
    if (!conectado) return;
    var btn = document.getElementById("btnAbrir");
    var st  = document.getElementById("status");

    btn.disabled = true;
    btn.classList.add("abierto");
    btn.textContent = "✓";
    st.textContent = "Puerta abierta";
    st.className = "status ok";

    var msg = new Paho.MQTT.Message("1");
    msg.destinationName = TOPIC;
    client.send(msg);

    setTimeout(function() {
      btn.disabled = false;
      btn.classList.remove("abierto");
      btn.textContent = "ABRIR";
      st.textContent = "";
      st.className = "status";
    }, 3000);
  }

  function setEstado(s) {
    var el = document.getElementById("estadoMqtt");
    if (s === "conectado") {
      el.textContent = "● Conectado";
      el.className = "estado-mqtt conectado";
    } else if (s === "conectando") {
      el.textContent = "● Conectando...";
      el.className = "estado-mqtt conectando";
    } else {
      el.textContent = "● Desconectado";
      el.className = "estado-mqtt desconectado";
    }
  }

  // Conectar al cargar la página
  window.onload = conectar;
</script>
</body>
</html>
